, {"label": "Tracker line", "text": "2026-07-19 | Listing | \"5191 Spring Drive, Swiftwater PA — $499,500\" | real photo (front 3/4 exterior, existing MLS asset, Canva 4:5 manual crop) | CTA: Linked (MLS# PM-142750) | CBC 2% | STATUS: publish after MLS bath count corrected to 4.5"}], "note": null, "flag": "Bath count must be corrected to 4.5 first."}]};

const DAYS = [
  {id:"sun", label:"Sun", full:"Sunday",    date:"July 19"},
  {id:"mon", label:"Mon", full:"Monday",    date:"July 20"},
  {id:"tue", label:"Tue", full:"Tuesday",   date:"July 21"},
  {id:"wed", label:"Wed", full:"Wednesday", date:"July 22"},
  {id:"thu", label:"Thu", full:"Thursday",  date:"July 23"},
  {id:"fri", label:"Fri", full:"Friday",    date:"July 24"},
  {id:"sat", label:"Sat", full:"Saturday",  date:"July 25"},
  {id:"gallery", label:"Gallery", full:"Website Gallery Cards", date:"Any time this week"}
];

const state = {};           // itemId -> bool
let sb = null;
let persist = false;

const $ = s => document.querySelector(s);
const key = id => DATA.weekHash + ":" + id;
const esc = s => String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---------- SYNC ---------- */
function setSync(cls, text){
  const el = $("#sync");
  el.className = "sync " + cls;
  $("#syncText").textContent = text;
}

async function initSync(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY){
    setSync("warn", "Not synced — add Supabase keys to save across devices");
    return;
  }
  try{
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const {data, error} = await sb.from("ops_checks")
      .select("key,done").like("key", DATA.weekHash + ":%");
    if(error) throw error;
    (data || []).forEach(r => { state[r.key.split(":").slice(1).join(":")] = !!r.done; });
    persist = true;
    setSync("ok", "Synced · " + DATA.weekHash);
    render();
  }catch(err){
    console.error(err);
    setSync("warn", "Sync failed — checks won't save. Check keys and RLS policy.");
  }
}

async function save(id, done){
  if(!persist) return;
  try{
    const {error} = await sb.from("ops_checks")
      .upsert({key:key(id), done, updated_at:new Date().toISOString()}, {onConflict:"key"});
    if(error) throw error;
    setSync("ok", "Saved " + new Date().toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}));
  }catch(err){
    console.error(err);
    setSync("warn", "Didn't save — check connection");
  }
}

/* ---------- RENDER ---------- */
let activeDay = DAYS[new Date().getDay()] ? DAYS[new Date().getDay()].id : "sun";
if(!DAYS.some(d => d.id === activeDay)) activeDay = "sun";

function itemsFor(day){ return DATA.items.filter(i => i.day === day); }
function doneCount(day){ return itemsFor(day).filter(i => state[i.id]).length; }

function renderTabs(){
  $("#tabs").innerHTML = DAYS.map(d => {
    const list = itemsFor(d.id), done = doneCount(d.id);
    const all = list.length > 0 && done === list.length;
    return `<button class="tab${all ? " all-done" : ""}" role="tab" data-day="${d.id}"
      aria-selected="${d.id === activeDay}">${d.label}
      <span class="count">${done}/${list.length}</span></button>`;
  }).join("");
}

function renderProgress(){
  const total = DATA.items.length;
  const done = DATA.items.filter(i => state[i.id]).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  $("#progressFill").style.width = pct + "%";
  $("#progressText").textContent = done + " of " + total + " posted";
  $("#progressPct").textContent = pct + "%";
}

function cardHTML(it){
  const done = state[it.id] ? "1" : "0";
  const blocks = it.blocks.map((b, i) => `
    <div class="block">
      <div class="block-head">
        <span class="block-label">${esc(b.label)}</span>
        <button class="copy-btn" data-copy="${it.id}|${i}">Copy</button>
      </div>
      <pre id="blk-${it.id}-${i}">${esc(b.text)}</pre>
    </div>`).join("");
  return `
  <article class="card" data-id="${it.id}" data-done="${done}" data-open="0"
           data-flagged="${it.flag ? 1 : 0}">
    <div class="card-top">
      <button class="check" data-check="${it.id}" aria-pressed="${done === "1"}"
        aria-label="Mark ${esc(it.title)} posted">
        <svg viewBox="0 0 24 24"><polyline points="4 12.5 9.5 18 20 6.5"/></svg>
      </button>
      <div class="card-main">
        <div class="card-time">${esc(it.time)}</div>
        <h3 class="card-title">${esc(it.title)}</h3>
        <div class="chips">
          <span class="chip acct">${esc(it.account)}</span>
          <span class="chip${it.kind === "gbp" ? " kind-gbp" : ""}">${esc(it.platform)}</span>
        </div>
      </div>
    </div>
    ${it.flag ? `<div class="flag">${esc(it.flag)}</div>` : ""}
    ${it.note ? `<div class="note">${esc(it.note)}</div>` : ""}
    <button class="toggle-blocks" data-toggle="${it.id}">
      <span>${it.blocks.length} copy block${it.blocks.length > 1 ? "s" : ""}</span>
      <span class="arrow">▼</span>
    </button>
    <div class="blocks">${blocks}</div>
  </article>`;
}

function renderDay(){
  const d = DAYS.find(x => x.id === activeDay);
  const list = itemsFor(activeDay);
  $("#main").innerHTML = `
    <div class="day-head">
      <h2>${esc(d.full)}</h2><span class="date">${esc(d.date)}</span>
    </div>
    ${list.length ? list.map(cardHTML).join("")
      : `<p class="empty">Nothing scheduled. Enjoy it.</p>`}`;
}

function render(){ renderTabs(); renderDay(); renderProgress(); }

/* ---------- EVENTS ---------- */
document.addEventListener("click", async e => {
  const tab = e.target.closest("[data-day]");
  if(tab){ activeDay = tab.dataset.day; render(); window.scrollTo({top:0}); return; }

  const chk = e.target.closest("[data-check]");
  if(chk){
    const id = chk.dataset.check;
    state[id] = !state[id];
    const card = chk.closest(".card");
    card.dataset.done = state[id] ? "1" : "0";
    chk.setAttribute("aria-pressed", state[id]);
    renderTabs(); renderProgress();
    save(id, state[id]);
    return;
  }

  const tog = e.target.closest("[data-toggle]");
  if(tog){
    const card = tog.closest(".card");
    card.dataset.open = card.dataset.open === "1" ? "0" : "1";
    return;
  }

  const cp = e.target.closest("[data-copy]");
  if(cp){
    const [id, i] = cp.dataset.copy.split("|");
    const text = document.getElementById("blk-" + id + "-" + i).textContent;
    try{
      await navigator.clipboard.writeText(text);
    }catch(_){
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); ta.remove();
    }
    cp.textContent = "Copied"; cp.classList.add("copied");
    setTimeout(() => { cp.textContent = "Copy"; cp.classList.remove("copied"); }, 1400);
  }
});

$("#resetBtn").addEventListener("click", async () => {
  if(!confirm("Clear every check for " + DATA.week + "? This can't be undone.")) return;
  const ids = DATA.items.map(i => i.id);
  ids.forEach(id => state[id] = false);
  render();
  if(persist){
    try{
      await sb.from("ops_checks").delete().like("key", DATA.weekHash + ":%");
      setSync("ok", "Week cleared");
    }catch(err){ console.error(err); setSync("warn", "Reset didn't save"); }
  }
});

/* ---------- BOOT ---------- */
$("#weekLabel").textContent = DATA.week;
render();
initSync();
</script>
</body>
</html>
