<style>
:root{
  --ink:#12130F;
  --paper:#F7F6F1;
  --card:#FFFFFF;
  --line:#DDDCD4;
  --muted:#6E6E64;
  --brass:#B98436;       /* accent — gold/warm earth, from the lounge + watercolor palette */
  --brass-deep:#8A5F1F;
  --alarm:#B03A2E;       /* flags */
  --radius:4px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Archivo',system-ui,-apple-system,sans-serif;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  padding-bottom:80px;
}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:3px solid var(--brass-deep);outline-offset:2px}

/* ---------- HEADER ---------- */
header{background:var(--ink);color:var(--paper);padding:18px 16px 14px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--brass);margin:0 0 6px}
h1{font-family:'Archivo Black',sans-serif;font-size:26px;line-height:.98;
  letter-spacing:-.02em;margin:0;text-transform:uppercase}
h1 span{display:block;color:var(--brass)}
.meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9C9C90;margin-top:8px}

/* progress spine */
.progress-wrap{margin-top:14px}
.progress-track{height:6px;background:#2A2C24;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;width:0;background:var(--brass);transition:width .35s ease}
.progress-label{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;color:#9C9C90;margin-top:6px;letter-spacing:.06em}
.progress-label b{color:var(--brass);font-weight:500}

/* ---------- DAY TABS ---------- */
nav{position:sticky;top:0;z-index:20;background:var(--ink);
  border-bottom:1px solid #2A2C24;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:0;padding:0 8px;min-width:max-content}
.tab{background:none;border:0;padding:11px 12px 10px;color:#8A8A7E;
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab[aria-selected="true"]{color:var(--paper);border-bottom-color:var(--brass)}
.tab .count{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;
  background:#2A2C24;color:#9C9C90;padding:1px 5px;border-radius:99px}
.tab[aria-selected="true"] .count{background:var(--brass);color:#FFF}
.tab.all-done .count{background:var(--brass-deep);color:#FFF}

/* ---------- DAY BODY ---------- */
main{padding:16px 12px 0;max-width:760px;margin:0 auto}
.day-head{display:flex;align-items:baseline;gap:10px;margin:4px 2px 14px}
.day-head h2{font-family:'Archivo Black',sans-serif;font-size:19px;margin:0;
  text-transform:uppercase;letter-spacing:-.01em}
.day-head .date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}

/* ---------- CARD ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden;position:relative}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--line)}
.card[data-done="1"]{opacity:.5}
.card[data-done="1"]::before{background:var(--brass-deep)}
.card[data-flagged="1"]::before{background:var(--alarm)}

.card-top{display:flex;gap:11px;padding:12px 13px 12px 15px;align-items:flex-start}
.check{flex:0 0 auto;width:26px;height:26px;border:2px solid var(--ink);border-radius:var(--radius);
  background:transparent;display:flex;align-items:center;justify-content:center;padding:0;
  transition:background .12s ease}
.check svg{width:15px;height:15px;stroke:var(--ink);stroke-width:3.2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .12s ease}
.card[data-done="1"] .check{background:var(--brass);border-color:var(--brass-deep)}
.card[data-done="1"] .check svg{opacity:1;stroke:#FFF}
.card[data-done="1"] .card-title{text-decoration:line-through;text-decoration-thickness:2px}

.card-main{flex:1;min-width:0}
.card-time{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;
  color:var(--muted);text-transform:uppercase}
.card-title{font-size:15.5px;font-weight:700;line-height:1.25;margin:2px 0 5px;letter-spacing:-.01em}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.04em;
  padding:2px 6px;border:1px solid var(--line);border-radius:99px;color:var(--muted)}
.chip.acct{border-color:var(--ink);color:var(--ink);font-weight:500}
.chip.kind-gbp{background:var(--brass);border-color:var(--brass);color:#FFF;font-weight:500}

.note,.flag{font-size:12.5px;line-height:1.4;padding:7px 13px 7px 15px;border-top:1px dashed var(--line)}
.note{color:var(--muted)}
.flag{background:#FDEDEB;color:#8E1C13;font-weight:600}
.flag::before{content:"⚑ ";}

/* ---------- BLOCKS ---------- */
.toggle-blocks{width:100%;background:#F2F1EB;border:0;border-top:1px solid var(--line);
  padding:9px 13px;text-align:left;font-size:12px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.toggle-blocks .arrow{transition:transform .2s ease;font-size:10px}
.card[data-open="1"] .toggle-blocks .arrow{transform:rotate(180deg)}
.blocks{display:none;padding:0 13px 13px 15px}
.card[data-open="1"] .blocks{display:block}
.block{margin-top:11px}
.block-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:5px}
.block-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted)}
.copy-btn{background:var(--ink);color:var(--paper);border:0;border-radius:var(--radius);
  padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  flex:0 0 auto}
.copy-btn.copied{background:var(--brass);color:#FFF}
pre{margin:0;background:#FAFAF6;border:1px solid var(--line);border-left:2px solid var(--ink);
  border-radius:var(--radius);padding:10px 11px;font-family:'IBM Plex Mono',monospace;
  font-size:12px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;
  max-height:260px;overflow-y:auto}

/* ---------- FOOTER / STATUS ---------- */
.sync{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#9C9C90;
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.06em;
  padding:9px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;z-index:30}
.sync .dot{display:inline-block;width:7px;height:7px;border-radius:99px;background:var(--muted);
  margin-right:6px;vertical-align:middle}
.sync.ok .dot{background:var(--brass)}
.sync.warn{color:#F4C542}
.sync.warn .dot{background:#F4C542}
.sync button{background:none;border:1px solid #3A3C33;color:#9C9C90;border-radius:var(--radius);
  padding:4px 9px;font-family:inherit;font-size:10px;letter-spacing:.06em;text-transform:uppercase}

.empty{text-align:center;color:var(--muted);padding:38px 20px;font-size:13.5px}

@media (min-width:700px){
  h1{font-size:34px}
  body{font-size:15.5px}
  .card-title{font-size:16.5px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
