market time and larger eventual reductions.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}], "note": "No hashtags. No addresses. No client names.", "flag": null}, {"id": "mon-fb", "day": "mon", "time": "10:00 AM", "title": "Personal FB — English (Real Estate Insight)", "account": "Personal", "platform": "Facebook", "kind": "post", "blocks": [{"label": "Post", "text": "If you got pre-approved in the spring and you're still shopping the same price range, go get that letter re-run this week.\n\nRates moved. 30-year fixed is around 6.5% now. On a $400,000 house with 5% down that's roughly $70–$90 more a month than a quarter point ago — about $15K–$20K of buying power that quietly disappeared.\n\nNobody from your lender is going to call and tell you this. It's not their job to. It's mine.\n\nMeanwhile Monroe County's median just hit a record ~$308,500 while closed sales dropped ~17.6%. Not a crash — just not enough houses trading. The ones that do are getting bid up.\n\nPriced right still moves fast here. Priced on 2022 numbers sits and cuts.\n\nQuestions, no pressure, no pitch — (570) 688-8147.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty"}], "note": null, "flag": null}, {"id": "mon-gbp2", "day": "mon", "time": "11:00 AM", "title": "GBP Local Insight — NEW SLOT", "account": "@alexa.realtor", "platform": "Google Business Profile", "kind": "gbp", "blocks": [{"label": "Post (no hashtags)", "text": "Local insight — Monroe County, week of July 20, 2026.\n\nMonroe County has one of the largest foreclosure pipelines in Northeast Pennsylvania, with more than 2,000 properties somewhere in the foreclosure process. That is happening at the same time the county median home price sits at a record of approximately $308,500, up roughly 7.9% year over year.\n\nThose two facts together are the part most homeowners misread. A large foreclosure pipeline in a record-price market does not mean values are falling. It reflects procedural backlog and legacy distress. What it does mean is that many owners currently in that pipeline — in Stroudsburg, East Stroudsburg, Tobyhanna, Mount Pocono, and Swiftwater — hold real equity in the property they are about to lose.\n\nEquity is preserved by selling before a sheriff sale. It is transferred to someone else by waiting for one. Options narrow sharply as the auction date approaches: months out, a conventional sale with proceeds is usually still available; weeks out, it usually is not.\n\nIf you are behind on payments in Monroe County, that first conversation costs nothing and carries no obligation. A HUD-approved housing counselor or an attorney should be part of it as well.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}], "note": null, "flag": "New slot — moved off Thursday. Locked July 2026."}, {"id": "mon-sub", "day": "mon", "time": "—", "title": "Substack Article — Operator Life", "account": "ROAST", "platform": "Substack", "kind": "article", "blocks": [{"label": "Title", "text": "I Started a Riding Journal After Three Months of Bad Rides in the Poconos"}, {"label": "Subtitle", "text": "Three months on a Ninja 400, inconsistent as hell, stuck in my own head. The fix wasn't more seat time. It was a notebook."}, {"label": "Article", "text": "Three months of riding street and I still couldn't tell you if I was getting better.\n\nThat's the part nobody warns you about. Everybody tells you the first ride is scary. Nobody tells you that month three is worse, because month three is when you've done it enough times to have a running list of everything you've done wrong, and not enough times to have proof you're improving.\n\nI put my foot down before I'd come to a complete stop. Again. Same intersection. Same stupid little hop off the peg two seconds early, like the bike was gonna fall over from a walking pace. And I got in my head about it. Not for a minute — for the rest of the ride. Every turn after that I'm riding tight, shoulders up, gripping the bars like they owed me money.\n\nThen I did the other thing I always do. Pinched the turn. Went in too tight, ran out of lean, corrected mid-corner. And I stopped a full two feet before the stop sign line, which is not a safety issue, it's a tell. It's the bike telling on me. It says I'm not measuring the distance, I'm reacting to it.\n\nThree months of that. Not a crash. Not a near miss. Just accumulated frustration, stacking up ride after ride until I was riding less because riding felt like a test I kept failing.\n\nSo I started journaling. Not because somebody told me to. Because I needed the thoughts out of my head and onto something that wasn't moving at 45 miles an hour.\n\nHere's what I found out in about a week: how I felt going into a ride was showing up in how I rode. Directly. Not vaguely, not spiritually — mechanically. The rides where I was already annoyed before I threw a leg over were the rides where I pinched turns. The rides where I was replaying last week's foot-down were the rides where I did it again. I was carrying the mistake into the next attempt and then executing the mistake because I was busy thinking about the mistake.\n\nThat's not a riding problem. That's an operating problem. And I recognized it immediately, because I've been doing the same thing in business for years.\n\nI run three things. A real estate business in Monroe County. A cigar lounge in Bartonsville. A television network. Every single one of them has weeks where something goes sideways, and the failure mode is never the sideways thing. The failure mode is me carrying the sideways thing into the next five decisions. A deal falls apart Tuesday and I'm short with a client Wednesday. A slow weekend at Nell's Social and I'm second-guessing a programming decision that was fine.\n\nThe mistake costs you once. The rumination costs you every time after.\n\nJournaling didn't make me a better rider. Let's be honest about that. Journaling made me a more consistent rider, and consistency is what actually made me better. I was riding less because riding felt bad. Riding felt bad because I never closed the loop on anything. Writing it down closes the loop. Foot down early at the light on 611 — written, done, filed. It's not living in my head anymore, it's on paper where I can look at it Sunday and go, okay, that's twice this week, that's a real pattern, here's the drill.\n\nThat's the whole thing. Not therapy. Not a mindset hack. A logging system.\n\nI already knew this. I log everything else. Every lead, every follow-up, every content piece, every week. The one place I wasn't logging was the one place I was actually learning something new, and that's exactly the place I needed it most.\n\nSo the operator lesson, and I'll keep it short because it's not complicated:\n\nYou don't get consistent by trying harder. You get consistent by writing it down. The thing you're avoiding logging is the thing you're most emotional about. And the thing you're most emotional about is the thing you're least honest about.\n\nI'm still putting my foot down early. I'm still pinching turns. But I'm riding more, and I'm not carrying Tuesday into Thursday anymore.\n\nThat's the win. That's the whole win.\n\n—\n\nAlexa Sanchez is a licensed Realtor in Pennsylvania — PA License #RS326383, Smart Way America Realty — serving Monroe County, the Pocono Mountains, and the Lehigh Valley. (570) 688-8147 · Alexa@alexasanchez.net\n\n#LifeByAlexa"}], "note": null, "flag": null}, {"id": "mon-note", "day": "mon", "time": "—", "title": "Substack Note 1", "account": "ROAST", "platform": "Substack Notes", "kind": "note", "blocks": [{"label": "Note", "text": "Three months of riding street and I couldn't tell you if I was getting better. That's the actual problem with month three. You have a full list of everything you've done wrong and zero proof you're improving. Started a journal. Not for feelings — for evidence."}], "note": null, "flag": null}, {"id": "tue-nd", "day": "tue", "time": "9:00 AM", "title": "Nextdoor — Neighborly Post", "account": "@alexa.realtor", "platform": "Nextdoor", "kind": "post", "blocks": [{"label": "Post", "text": "Neighbors — a heads up for anyone on well and septic around Swiftwater, Bartonsville, and Tobyhanna Township.\n\nWe're mid-summer and this is the stretch where septic pump issues tend to surface, usually after a heavy-use weekend with guests in the house. If you've got a pump system and you haven't had eyes on it since spring, it's a cheap thing to check now and an expensive thing to discover in October.\n\nSame for well pressure. If you've noticed anything inconsistent, note when it happens — morning, after laundry, after a full house. That detail is genuinely useful to whoever you call.\n\nNot selling anything, just something I see come up a lot this time of year in our area.\n\nIf anybody has a septic or well contractor in the Swiftwater / Bartonsville area they've had a good experience with, drop the name below — always useful to have a running list.\n\n— Alexa Sanchez, Bartonsville / East Stroudsburg area"}], "note": "NO selling language. NO CTA. Realtor identity via signature only.", "flag": null}, {"id": "tue-cc", "day": "tue", "time": "3:00 PM", "title": "Car Confession — 2,000 Foreclosures", "account": "@alexa.realtor", "platform": "IG + YouTube Shorts", "kind": "video", "blocks": [{"label": "Script (20 sec)", "text": "Two thousand houses in Monroe County are in foreclosure right now.\n\nAnd the median price just hit an all-time high.\n\nBoth of those are true, which means most of those people are about to lose a house they have equity in.\n\nThe bank doesn't call. The county doesn't call. The auction just gets closer.\n\nIf that's you — sell it before somebody else gets to.\n\n[Flat delivery. No sympathy voice. Hard cut on \"to.\"]"}, {"label": "IG caption", "text": "2,000+ properties in Monroe County are somewhere in the foreclosure process — one of the largest pipelines in Northeast PA.\n\nThe county median just hit a record ~$308,500, up ~7.9% year over year.\n\nBoth true. Which means most of those owners have real equity, and the sheriff sale is the mechanism that hands it to somebody else.\n\nThe market is not crashing. That pipeline is backlog and legacy distress, not underwater homeowners.\n\nIf you're behind: options narrow as the auction date gets closer, and they narrow fast. Selling with equity intact is usually still on the table months out and usually isn't weeks out.\n\nFree conversation. Confidential. No pitch. (570) 688-8147.\n\nEducational information, not legal or financial advice — a housing counselor or attorney should be part of this conversation too.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty\n\n#MonroeCountyPA #PoconoRealEstate #Foreclosure #PARealEstate #PoconoMountains #LifeByAlexa"}, {"label": "Cover text", "text": "NEON GREEN: 2,000 FORECLOSURES\nWHITE: RECORD PRICES\nRED: BOTH TRUE"}, {"label": "YouTube Shorts title", "text": "2,000 Foreclosures in Monroe County PA — And Record Home Prices. Both Are True."}, {"label": "YouTube Shorts description", "text": "Is the Pocono Mountains housing market crashing? No. Monroe County's median home price recently hit a record of approximately $308,500, up around 7.9% year over year, while inventory remains below balanced levels.\n\nThen why are there 2,000+ foreclosures in Monroe County? Monroe County has one of the largest foreclosure pipelines in Northeast Pennsylvania. That pipeline reflects procedural backlog and legacy distress rather than a new wave of underwater homeowners.\n\nWhat does that mean for a homeowner behind on payments? In a record-price market, most owners in the pipeline hold real equity. Selling before a sheriff sale generally preserves that equity; waiting for the auction typically transfers it to someone else.\n\nHow late is too late? Options narrow sharply as the auction date approaches. The earlier the conversation happens, the more of them still exist.\n\nThis is educational information, not legal or financial advice. Homeowners facing foreclosure should also consult a housing counselor or attorney.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}, {"label": "Tags", "text": "monroe county foreclosure, pocono mountains housing market, is the housing market crashing, sell house before foreclosure, pennsylvania sheriff sale, stroudsburg pa real estate, foreclosure equity, monroe county pa homes, pocono realtor, distressed property pennsylvania, pre foreclosure sale, pa housing market 2026"}], "note": "Swapped in over the pre-approval confession — see Backup below.", "flag": null}, {"id": "tue-backup", "day": "tue", "time": "Backup", "title": "Car Confession — Pre-Approval (ON DECK)", "account": "@alexa.realtor", "platform": "IG + YouTube Shorts", "kind": "video", "blocks": [{"label": "Script (20 sec)", "text": "Your pre-approval from March is a lie.\n\nRates went from six and a quarter to six and a half. On a four hundred thousand dollar house that's ninety dollars a month you didn't budget for.\n\nWhich means the house you got approved for in March? You can't afford it in July.\n\nNobody called you. Nobody's going to. Re-run your numbers.\n\n[19 seconds. Flat, no smile, no wind-down. Cut on \"numbers.\"]"}, {"label": "IG caption", "text": "Your March pre-approval is a lie and your lender didn't call you.\n\n30-year fixed moved to ~6.5%. On a $400K purchase with 5% down that's $70–$90/month you didn't plan for — roughly $15K–$20K of buying power, gone.\n\nIf you got pre-approved this spring and you're still shopping that price band in Monroe County, re-run it this week before you fall in love with something you can't close on.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty · (570) 688-8147\n\n#PoconoRealEstate #MonroeCounty #PARealEstate #FirstTimeHomeBuyer #MortgageRates #PoconoMountains #LifeByAlexa"}, {"label": "Cover text", "text": "RED: YOUR PRE-APPROVAL\nWHITE: IS A LIE\nNEON GREEN (small): 6.25% → 6.5%"}], "note": "Hold for next Tuesday, or run as a 7:00 PM second Short.", "flag": null}, {"id": "tue-listing-fix", "day": "tue", "time": "—", "title": "FIX — 5191 Spring Drive bath count", "account": "Production", "platform": "MLS", "kind": "task", "blocks": [{"label": "What to fix", "text": "Confirmed correct: 4 BD / 4.5 BA · 3,654 SF · $499,500 · MLS# PM-142750 · Active · Swiftwater, PA 18370.\n\nMLS field currently reads 5 BA — WRONG.\nPublic remarks currently read \"4-bath\" — WRONG.\n\nCorrect both to 4.5 before any listing content in this week goes out. Advertising accuracy, 49 Pa. Code §35.305."}, {"label": "Photo selection (no shoot)", "text": "43 photos already live. Pull the hero from existing assets.\n\nHero: front three-quarter exterior. Crop tighter than the MLS version — the current frame carries a shed on the left edge and a utility pole on the right and both pull attention off the house. Canva, manual crop, 4:5, porch and peaked roofline centered, tree canopy in the top third.\n\nCarousel order: front porch → eat-in kitchen → gas fireplace → primary suite sitting room → attic-conversion walk-in closet → lower-level kitchenette + living room → deck/rear yard.\n\nThe attic closet is the differentiator. If none of the 43 show its scale, that's the one frame worth re-shooting.\n\nDo not use: septic area, well head, utility pole, neighboring property."}], "note": null, "flag": "Blocks Wednesday GBP + gallery Listing Card."}, {"id": "tue-record", "day": "tue", "time": "—", "title": "RECORD ONLY — DR Video EN + ES", "account": "@alexa.realtor", "platform": "—", "kind": "shoot", "blocks": [{"label": "Setup", "text": "Shot indoors, seated, mid-shot. Warm lamp light, no overhead. Neutral wall or shelving behind — no beach stock imagery, no palm trees, no drone footage. This is a documents-and-numbers topic and it should look like it.\n\nOn-screen text cards as each number lands, chunky and tilted:\n3% (neon green) · 15 AÑOS / 15 YEARS (white) · DGII (red) · FECHA DE APROBACIÓN (white)\n\nNo music under the Spanish version — let the cadence carry it."}], "note": "Both versions post Friday. Scripts in the Friday cards.", "flag": null}, {"id": "tue-note", "day": "tue", "time": "—", "title": "Substack Note 2", "account": "ROAST", "platform": "Substack Notes", "kind": "note", "blocks": [{"label": "Note", "text": "The mistake costs you once. The rumination costs you every time after.\n\nPut my foot down early at a light. Rode tight for the next forty minutes because of it. The foot-down wasn't the problem. The forty minutes was."}], "note": null, "flag": null}, {"id": "wed-gbp", "day": "wed", "time": "9:00 AM", "title": "GBP Listing Feature — Swiftwater", "account": "@alexa.realtor", "platform": "Google Business Profile", "kind": "gbp", "blocks": [{"label": "Post (no hashtags)", "text": "New listing in Swiftwater, Monroe County — 4-bedroom, 4.5-bath Colonial, 3,654 square feet on 0.78 wooded acres.\n\nThree finished levels. The primary suite includes a private bath, a walk-in closet, a bonus sitting room or den that works as a home office or dressing room, and an additional oversized walk-in created from finished attic space. Main level has an eat-in kitchen, a gas fireplace, and a covered front porch. The lower level adds a living room, kitchenette, full bath, and an additional bedroom-style room — a practical layout for guests or multigenerational living.\n\nAdditional features: paved driveway, deck, well water, on-site septic with an updated pump system installed in 2020, and four off-street parking spaces.\n\nLocated in the Pocono Mountain School District, convenient to Route 611 and Interstate 380 — roughly 10 minutes to Bartonsville and 15 to Mount Pocono.\n\nOffered at $499,500. Buyer to independently verify all square footage, permits, and school assignment.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}], "note": null, "flag": "Publish only after the MLS bath count is corrected to 4.5."}, {"id": "wed-es", "day": "wed", "time": "—", "title": "Weekly Spanish Highlight — 171-07 + CONFOTUR", "account": "@alexa.realtor", "platform": "IG + YouTube", "kind": "video", "blocks": [{"label": "Script (Spanish, ~2:40)", "text": "Si tú eres veterano y estás pensando en la República Dominicana, tienes dos herramientas y casi nadie te las explica juntas. Yo te las voy a explicar juntas, porque separadas no valen ni la mitad.\n\nHerramienta número uno: la Ley 171-07. Residencia rápida.\n\nHay tres caminos.\n\nPensionado. Si tú tienes una pensión de mil quinientos dólares al mes o más, calificas. Y si vas con dependientes, doscientos cincuenta dólares más al mes por cada uno. Óyeme bien: una pensión de discapacidad del VA cuenta como pensión. Eso es lo que la mayoría de los veteranos no sabe. Tú ya podrías estar calificado y no lo sabes.\n\nRentista. Dos mil dólares al mes de ingreso pasivo de fuente extranjera. Renta, dividendos — no salario.\n\nInversionista. Doscientos mil dólares en propiedad o en un negocio.\n\nCon Pensionado te dan residencia permanente de una vez, más entrada libre de impuestos de tus cosas de la casa y de un vehículo. La primera tarjeta es de un año, después se renueva cada cuatro.\n\nHerramienta número dos: CONFOTUR. La Ley 158-01.\n\nSi compras en un proyecto aprobado en zona turística, te exoneran el tres por ciento del impuesto de transferencia al cierre, y hasta quince años del uno por ciento anual de IPI.\n\nAhora, ¿por qué te digo que hay que verlas juntas?\n\nPorque una te arregla el estatus y la otra te arregla el costo, y las dos tienen relojes distintos.\n\nCONFOTUR va con la propiedad. El reloj de los quince años empieza cuando aprobaron el proyecto, no cuando tú firmaste.\n\nLa residencia va contigo. Y tiene su propio número que tienes que entender: ciento ochenta y dos días. Si tú pasas más de ciento ochenta y dos días al año en el país, te vuelves residente fiscal dominicano. Hay un período de gracia de unos tres años sobre el ingreso de fuente extranjera, y después de eso República Dominicana te grava solo lo que se genera allá, porque el sistema es territorial.\n\nPero — y esto es lo importante — tú sigues siendo persona de los Estados Unidos. Tú sigues declarando allá sobre tu ingreso mundial. CONFOTUR solo te exime de impuestos dominicanos. Eso se maneja con un contador de las dos jurisdicciones, con créditos fiscales extranjeros.\n\nY una cosa que sí tienes que oír, aunque no te guste: tu préstamo VA no funciona allá. La garantía del VA es solo para propiedad en los Estados Unidos y ciertos territorios. República Dominicana no es ninguno de los dos. Allá es efectivo, banco dominicano, o financiamiento del desarrollador.\n\nEntonces la jugada inteligente para mucha gente es esta: usa tu beneficio VA aquí, en Pensilvania, en una propiedad que trabaje para ti — y estructura la compra en República Dominicana por otro lado, con CONFOTUR y con 171-07.\n\nDos herramientas. Una para el estatus, una para el costo. Úsalas juntas.\n\nAlexa Sanchez, Realtor licenciada en Pensilvania, licencia RS326383, Smart Way America Realty. Cinco siete cero, seis ocho ocho, ocho uno cuatro siete.\n\nInformación educativa. No es asesoría fiscal ni legal. No respaldado por el VA."}, {"label": "IG caption", "text": "Veteranos: son DOS herramientas, no una. Y separadas no valen ni la mitad.\n\nLEY 171-07 — residencia rápida\n• Pensionado: pensión de $1,500/mes o más (+$250/mes por dependiente). Una pensión por discapacidad del VA califica — eso es lo que casi nadie sabe.\n• Rentista: $2,000/mes de ingreso pasivo de fuente extranjera (renta, dividendos — no salario)\n• Inversionista: $200,000 en propiedad o negocio\n• Primera tarjeta: 1 año. Después se renueva cada 4 años.\n• Pensionado incluye entrada libre de impuestos de menaje de casa y un vehículo\n\nCONFOTUR (Ley 158-01) — el costo\n• Exonera el 3% de impuesto de transferencia al cierre\n• Hasta 15 años del 1% anual de IPI\n• El reloj empieza en la aprobación del PROYECTO, no en tu cierre\n\nLos dos números que tienes que saber:\n→ 182 días al año en el país = residencia fiscal dominicana (con ~3 años de gracia sobre ingreso extranjero)\n→ Tu préstamo VA NO funciona en RD. Solo EE.UU. y ciertos territorios. Allá es efectivo, banco dominicano o desarrollador.\n\nLa jugada: beneficio VA aquí en Pensilvania. CONFOTUR y 171-07 allá.\n\nInformación educativa. No es asesoría fiscal ni legal. No respaldado por el VA.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty · (570) 688-8147\n\n#BienesRaices #RepublicaDominicana #Veteranos #CONFOTUR #InversionesEnPoconos #PuntaCana #LifeByAlexa"}, {"label": "YouTube title", "text": "Veteranos en República Dominicana: Ley 171-07 + CONFOTUR | Residencia y Exención de Impuestos"}, {"label": "YouTube description", "text": "¿Un veterano puede sacar residencia en República Dominicana con su pensión del VA? Bajo la vía Pensionado de la Ley 171-07 se requiere una pensión de al menos $1,500 mensuales, más $250 por cada dependiente. Una pensión por discapacidad del VA generalmente califica como pensión para estos fines.\n\n¿Cuáles son las tres vías de la Ley 171-07? Pensionado ($1,500/mes de pensión), Rentista ($2,000/mes de ingreso pasivo de fuente extranjera) e Inversionista ($200,000 en propiedad o negocio).\n\n¿Cuánto dura la residencia? La primera tarjeta de residencia permanente normalmente es válida por 1 año y luego se renueva cada 4 años.\n\n¿Qué pasa con los impuestos si vivo allá? Se considera residencia fiscal después de 182 días por año en el país. Los nuevos residentes tienen aproximadamente 3 años de gracia sobre ingreso de fuente extranjera; después, República Dominicana grava principalmente el ingreso de fuente dominicana por su sistema territorial.\n\n¿Qué hace CONFOTUR? En proyectos aprobados en zonas turísticas exonera el 3% de impuesto de transferencia (ITBI) al cierre y hasta 15 años del 1% anual de IPI. El plazo de 15 años empieza en la aprobación del proyecto, no en la fecha de compra.\n\n¿Puedo usar mi préstamo VA en República Dominicana? No. La garantía del VA aplica solo a propiedades en Estados Unidos y ciertos territorios. Las compras en RD se hacen con efectivo, banco dominicano o financiamiento del desarrollador.\n\n¿Dejo de declarar en Estados Unidos? No. CONFOTUR exonera impuestos dominicanos únicamente. Una persona estadounidense sigue declarando ingreso mundial en EE.UU., normalmente mitigado con créditos fiscales extranjeros.\n\n0:00 Dos herramientas · 0:20 Ley 171-07 y las tres vías · 1:05 CONFOTUR · 1:30 Los dos relojes · 1:55 Los 182 días · 2:15 El préstamo VA no aplica\n\nInformación educativa. No es asesoría fiscal ni legal. No respaldado por el VA.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}, {"label": "Tags", "text": "ley 171-07 republica dominicana, residencia pensionado republica dominicana, confotur, veteranos en republica dominicana, prestamo va republica dominicana, residencia rentista rd, impuestos republica dominicana, comprar en punta cana, bienes raices republica dominicana, veteranos beneficios, inversionista republica dominicana, residencia fiscal 182 dias"}, {"label": "Cover text", "text": "NEON GREEN: 171-07\nWHITE: + CONFOTUR\nRED (smaller): VETERANOS\nWhite kicker: TU VA LOAN NO SIRVE ALLÁ"}], "note": "Under 3 min · one topic · written fresh — NOT a translation. Do not merge with Friday's DR ES.", "flag": null}, {"id": "wed-tt", "day": "wed", "time": "—", "title": "Talking Head — \"I said no to a good deal\"", "account": "@its.myash", "platform": "TikTok", "kind": "video", "blocks": [{"label": "Script", "text": "An opportunity showed up at my door this month and I said no. It was a good deal.\n\nThat's the part people don't get. It wasn't a bad deal. It was a real opportunity with real upside and I turned it down, and I'd do it again.\n\nBecause here's what nobody tells you when you're building: the dangerous offers aren't the bad ones. Bad ones are easy. You see a bad deal, you say no, you go back to work.\n\nThe dangerous ones are the good ones that aren't yours.\n\nI run a real estate business in Monroe County. I run a cigar lounge in Bartonsville. I'm COO and Executive Producer of a television network that starts development August first. Every single one of those has a fixed amount of my attention, and that number does not grow because something exciting showed up.\n\nSo the question is never \"is this a good opportunity.\" The question is \"what does this cost me in the things I already committed to.\"\n\nGood idea. Great potential. Wrong operator, wrong quarter, wrong priority list.\n\nSay it out loud: a good idea is not a reason. Alignment is the reason. If it doesn't move something you already decided mattered, it's not an opportunity — it's a distraction wearing a suit.\n\nI said no. I'm still building the same three things. That's the flex."}, {"label": "TikTok caption", "text": "Turned down a good deal this month. Not a bad one — a good one.\n\nThe dangerous offers aren't the bad ones, those are easy. The dangerous ones are good opportunities that aren't yours. Real estate in Monroe County, Nell's Social in Bartonsville, KSM TV development starting August 1 — every one of those has a fixed amount of my attention and that number doesn't grow because something exciting showed up.\n\nA good idea is not a reason. Alignment is the reason.\n\n#OperatorLife #DominicanEntrepreneur #LifeByAlexa"}, {"label": "Visual", "text": "Shot at Nell's Social, warm interior light, no overhead fluorescents. Seated, cigar or coffee in hand, one take, no cuts."}], "note": null, "flag": null}, {"id": "wed-ig", "day": "wed", "time": "—", "title": "Talking Head — IG post", "account": "@its.myash", "platform": "Instagram", "kind": "post", "blocks": [{"label": "IG caption", "text": "I said no to a good deal this month.\n\nNot a bad deal. A good one — real upside, real potential. Turned it down.\n\nBecause the dangerous offers were never the bad ones. Bad ones you spot in thirty seconds. The dangerous ones are good opportunities that belong to somebody else's plan.\n\nReal estate in Monroe County. Nell's Social in Bartonsville. KSM TV — development starts August 1. Three things, one operator, fixed attention. That number doesn't grow because something exciting knocked.\n\nThe question is never \"is this good.\" It's \"what does this cost the things I already committed to.\"\n\nA good idea is not a reason. Alignment is the reason.\n\n#OperatorLife #DominicanEntrepreneur #LifeByAlexa"}], "note": "Same video as TikTok.", "flag": null}, {"id": "wed-fb", "day": "wed", "time": "—", "title": "FB Business — cigar repurpose", "account": "@its.myash", "platform": "Facebook Business", "kind": "post", "blocks": [{"label": "Post", "text": "The cigar I hand people who swear they don't like cigars: the Rosario Grey Goose Mint Vanilla.\n\nConnecticut wrapper, mild to mild-medium, infused with Grey Goose vodka, vanilla and mint. Creamy smoke, cool finish, easy draw. No learning curve, nobody coughing, nobody feeling stupid.\n\nIt's on the shelf at Nell's Social because it's an aroma cigar — on a Saturday dance night it's the stick somebody smells from across the room and comes over to ask about.\n\nPair it with a chilled Grey Goose and citrus, or a vanilla latte if you want the cream forward. Skip it if you're chasing Nicaraguan spice — this one's dessert.\n\nAnd for the record: the Dominican Republic just secured a Geographical Indication for Dominican cigars, with 196 million premium cigars exported to 148 countries last year. \"Dominican means mild\" is over. Dominican is precise.\n\nNell's Social · 25 Route 611, Suite 1, Bartonsville, PA\nThursday movies · Friday spades · Saturday dance"}], "note": null, "flag": null}, {"id": "wed-note", "day": "wed", "time": "—", "title": "Substack Note 3", "account": "ROAST", "platform": "Substack Notes", "kind": "note", "blocks": [{"label": "Note", "text": "Every operator I know logs their leads, their follow-ups, their content, their numbers. And then leaves the one thing they're actually still learning completely un-logged.\n\nThe thing you won't write down is the thing you're most emotional about. Which makes it the thing you're least honest about."}], "note": null, "flag": null}, {"id": "thu-li", "day": "thu", "time": "8:00 AM", "title": "LinkedIn Operator Post (2/3) — 6 to 25", "account": "@alexa.realtor", "platform": "LinkedIn", "kind": "post", "blocks": [{"label": "Post", "text": "Nell's Social went from 6 people on a weekend night to 25. Same room in Bartonsville, same inventory, same staff.\n\nWe didn't rebrand. We didn't spend on ads. We named three nights and did them in the same order every week for long enough that people stopped checking.\n\nThursday movie night. Friday spades tournament. Saturday dance party.\n\nBefore that: seven months of good events announced four days out. And a good event announced four days out is not a ritual — it's an interruption. It asks the customer to make a decision, and nobody has decision-making energy left for your business on a Thursday.\n\nThree things worth taking from this if you operate anything customer-facing:\n\n1. Order of operations is foot traffic → engagement → sales. Most operators try to run it backwards and post their way into a full room. Twenty-five people generate footage. Six people generate a caption.\n\n2. Pick formats that demand a next week. The spades tournament is the strongest night because you cannot run a tournament once. Losers want a rematch, winners want to defend. The format handles retention without me.\n\n3. Consistency compounds invisibly, then all at once. Week two, nobody noticed. Week five, everybody did. The dangerous window is the middle, when you have all the cost and none of the proof.\n\nU.S. cigar lounge revenue is projected around $1.2 billion by end of 2026, and the share is going to venues programming experiences rather than stocking shelves. But an experience you run once is an event. The value is in the repeat.\n\nAlexa Sanchez · COO & Executive Producer, KSM TV · Licensed Realtor, PA License #RS326383, Smart Way America Realty · Nell's Social, Bartonsville PA\n\n#OperatorLife #SmallBusiness #CustomerExperience"}], "note": null, "flag": null}, {"id": "thu-gbp-en", "day": "thu", "time": "9:00 AM", "title": "GBP Veteran Post — English", "account": "@alexa.realtor", "platform": "Google Business Profile", "kind": "gbp", "blocks": [{"label": "Post (no hashtags)", "text": "Veteran benefit update — Monroe County, week of July 20, 2026.\n\nPennsylvania has issued $224.4 million in Property Tax/Rent Rebate payments to 372,291 residents as of July 4, 2026. Payments began July 1. For the 2025 tax year, standard rebates range from $380 to $1,000, with a household income cap of $48,110 — and half of Social Security income is excluded from that calculation. Supplemental rebates in qualifying high-tax areas can raise the maximum to $1,500. Applications must be filed by December 31, 2026.\n\nSeparately, the Disabled Veterans Real Estate Tax Exemption provides a 100% real estate tax exemption on a primary residence for honorably discharged veterans who are 100% service-connected disabled, meet wartime service criteria, and demonstrate financial need — presumed at annual income of $95,279 or less. These are two separate programs with two separate applications.\n\nEducational information only. Not tax or legal advice. Not VA-endorsed.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}], "note": null, "flag": "Veteran-only now. Local Insight moved to Monday 11 AM."}, {"id": "thu-gbp-es", "day": "thu", "time": "9:00 AM", "title": "GBP Veteran Post — Spanish", "account": "@alexa.realtor", "platform": "Google Business Profile", "kind": "gbp", "blocks": [{"label": "Post (no hashtags)", "text": "Veteranos en el condado de Monroe: Pensilvania ya pagó 224.4 millones de dólares en reembolsos de impuestos a la propiedad este año, a 372,291 residentes al 4 de julio de 2026. Los pagos empezaron el 1 de julio.\n\nPrograma de Reembolso de Impuestos a la Propiedad (PTRR), año fiscal 2025:\n• Reembolso estándar de $380 a $1,000 según ingreso\n• Límite de ingreso: $48,110 — y la mitad del Seguro Social NO cuenta para ese límite\n• Fecha límite para solicitar: 31 de diciembre de 2026\n\nPrograma aparte para veteranos: la Exención de Impuestos Inmobiliarios para Veteranos Discapacitados (DVRETX) elimina el 100% del impuesto a la propiedad en la residencia principal para veteranos con discapacidad 100% conectada al servicio que cumplan los requisitos de servicio en tiempo de guerra y necesidad financiera. La necesidad financiera se presume con ingreso anual de $95,279 o menos. Puede transferirse a un cónyuge sobreviviente no casado.\n\nSon dos solicitudes distintas. Solicitar una no solicita la otra.\n\nInformación educativa. No es asesoría fiscal. Sin garantía de tasas. No respaldado por el VA.\n\nAlexa Sanchez, Realtor Licenciada\nPA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}], "note": null, "flag": null}, {"id": "thu-vet", "day": "thu", "time": "11:00 AM", "title": "Veteran Reel (PA) — PTRR / DVRETX", "account": "@alexa.realtor", "platform": "Instagram", "kind": "video", "blocks": [{"label": "Script (45 sec)", "text": "Pennsylvania has already paid out two hundred twenty-four million dollars in property tax rebates this year and a lot of veterans in Monroe County haven't filed.\n\nProperty Tax Rent Rebate. Standard rebate runs three hundred eighty to a thousand dollars. Income cap is forty-eight thousand one hundred ten, and half your Social Security doesn't count toward that cap. Read that again — half your Social Security is excluded.\n\nPayments started July first. As of July fourth, three hundred seventy-two thousand Pennsylvanians had been paid.\n\nYou file for 2025 taxes. You have until December thirty-first, 2026.\n\nSeparate program, and this is the bigger one: Disabled Veterans Real Estate Tax Exemption. One hundred percent service-connected, wartime service, financial need — that's a full exemption on your primary residence. Not a rebate. The whole bill. And it can pass to an unmarried surviving spouse.\n\nHouse Bill 1257 would expand that to all one hundred percent disabled veterans regardless of combat status. Passed the House March twenty-fourth. Sitting in the Senate. Not law yet — don't plan around it.\n\nTwo different programs, two different applications. Check both.\n\nAlexa Sanchez, PA License number RS326383, Smart Way America Realty. Five seven zero, six eight eight, eight one four seven."}, {"label": "IG caption", "text": "PA has paid out $224.4 million in property tax rebates already this year — to 372,291 people as of July 4. Filing is open and a lot of Monroe County veterans haven't done it.\n\nPROPERTY TAX/RENT REBATE (PTRR) — 2025 tax year\n• Standard rebate: $380–$1,000\n• Income cap: $48,110 — and half of Social Security is excluded\n• Brackets: $0–$8,550 → $1,000 · $8,551–$16,040 → $770 · $16,041–$19,240 → $460 · $19,241–$48,110 → $380\n• Supplemental \"kicker\" in qualifying high-tax areas can push the max to $1,500\n• Payments began July 1, 2026 · File by December 31, 2026\n\nDVRETX — Disabled Veterans Real Estate Tax Exemption (separate program)\n• 100% real estate tax exemption on a primary residence\n• Requires 100% service-connected disability, wartime service criteria, and financial need\n• Financial need is presumed at annual income of $95,279 or less\n• Can pass to an unmarried surviving spouse who meets need criteria\n\nHB 1257 would expand DVRETX to all 100% disabled veterans regardless of combat status and strengthen surviving-spouse protection. Passed the PA House March 24, 2026. Currently in the Senate. Not law — do not plan around it.\n\nThese are two separate applications. Filing one does not file the other.\n\nVeteran-friendly guidance only — not VA-endorsed, not tax advice, no rate guarantees.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net\n\n#VeteranHomebuyer #VALoan #VeteranRealEstate #PARealEstate #MonroeCountyPA #PropertyTaxRebate #LifeByAlexa"}, {"label": "Cover text", "text": "NEON GREEN: $224 MILLION\nWHITE: ALREADY PAID\nRED (smaller): PA VETERANS — DID YOU FILE?"}], "note": null, "flag": null}, {"id": "thu-yt", "day": "thu", "time": "11:00 AM", "title": "Veteran Upload (PA) — YouTube", "account": "@alexa.realtor", "platform": "YouTube", "kind": "video", "blocks": [{"label": "Script addition (after DVRETX section)", "text": "One more piece if you're buying, not just owning. PHFA's K-FIT program. Five percent of the lesser of purchase price or appraised value, as a second mortgage for down payment and closing costs. No maximum dollar cap. Minimum five hundred dollars. Forgiven at ten percent a year over ten years — stay in the home ten years, the whole thing is gone.\n\nRequirements: six-sixty minimum credit score, and post-closing liquid assets can't exceed fifty thousand after your closing funds come out.\n\nThe catch: K-FIT cannot be combined with other PHFA assistance. The only exception is ACCESS Home Modification. So you're choosing between K-FIT and something like HOMEstead — you don't get both. On a four-fifty purchase, five percent K-FIT is twenty-two thousand five hundred, which usually beats a flat-dollar grant. Run both.\n\nAnd yes, K-FIT layers with a VA first mortgage."}, {"label": "YouTube title", "text": "PA Veteran Property Tax Rebate 2026 | PTRR, DVRETX & HB 1257 Explained (File by Dec 31)"}, {"label": "YouTube description", "text": "How much is the Pennsylvania Property Tax/Rent Rebate for 2026? The standard rebate for the 2025 tax year ranges from $380 to $1,000 based on income, with supplemental rebates in qualifying high-tax areas pushing the maximum to $1,500.\n\nWhat's the income limit? $48,110 in household income for 2025 property taxes — and half of Social Security income is excluded when calculating eligibility, which is why many people who assume they're over the cap are not.\n\nWhen are PTRR payments issued and when is the deadline? Payments began July 1, 2026. As of July 4, 2026, PA Treasury reported $224.4 million paid to 372,291 Pennsylvanians. Applications for 2025 taxes must be filed by December 31, 2026.\n\nWhat is the Disabled Veterans Real Estate Tax Exemption (DVRETX)? A 100% real estate tax exemption on a primary residence for honorably discharged veterans who are 100% service-connected disabled, meet wartime service criteria, and demonstrate financial need. Financial need is presumed at annual income of $95,279 or less. It can pass to an unmarried surviving spouse who meets the need criteria.\n\nIs DVRETX the same as the property tax rebate? No. They are two separate programs with two separate applications. Filing one does not file the other.\n\nWhat is HB 1257? A proposed constitutional amendment to expand DVRETX to all veterans rated 100% disabled by VA regardless of combat status, with stronger surviving-spouse protection. It passed the Pennsylvania House on March 24, 2026 and is currently in the Senate. It is not law yet.\n\nWhat is PHFA K-FIT? A second mortgage providing 5% of the lesser of purchase price or appraised value for down payment and closing costs, with no maximum dollar cap and a $500 minimum. It's forgiven at 10% per year over 10 years. Requires a 660 minimum credit score and post-closing liquid assets under $50,000. K-FIT cannot be combined with other PHFA assistance except ACCESS Home Modification, and it can be paired with a VA first mortgage.\n\n0:00 $224 million already paid · 0:15 PTRR brackets and income cap · 0:35 Deadline · 0:45 DVRETX full exemption · 1:10 HB 1257 status · 1:30 PHFA K-FIT\n\nEducational only. Not VA-endorsed. Not tax or legal advice. No rate guarantees.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}, {"label": "Tags", "text": "pa property tax rent rebate 2026, ptrr pennsylvania, disabled veterans real estate tax exemption pa, dvretx, hb 1257 pennsylvania, veteran property tax pennsylvania, phfa k-fit, va loan pennsylvania, monroe county veterans, pocono mountains veteran homebuyer, pennsylvania veteran benefits 2026, first time home buyer pa veteran"}], "note": null, "flag": null}, {"id": "thu-nd", "day": "thu", "time": "—", "title": "Nextdoor — Landmark repost", "account": "@alexa.realtor", "platform": "Nextdoor", "kind": "post", "blocks": [{"label": "Post", "text": "Took the boardwalk at Thomas Darling Preserve in Pocono Lake this week and it's about as green as it gets right now. 1,400-plus acres, dawn to dusk, entrance at 606 PA-940 off Route 940.\n\nThe boardwalk section is flat and short, so it's an easy one if you've got kids or you're not looking for a real hike. Bring bug spray — it's wetland, they're not shy.\n\nBest light is the last hour or so before sunset if anybody's going out with a camera.\n\n— Alexa Sanchez, Pocono Lake / Bartonsville area"}], "note": "No selling language. No CTA.", "flag": null}, {"id": "thu-fb", "day": "thu", "time": "—", "title": "FB Business — veteran repurpose", "account": "@alexa.realtor", "platform": "Facebook Business", "kind": "post", "blocks": [{"label": "Post", "text": "Pennsylvania has already paid out $224.4 million in property tax rebates this year — to 372,291 people as of July 4. Filing is open and a lot of Monroe County veterans and seniors haven't done it.\n\nProperty Tax/Rent Rebate, 2025 tax year:\n• Standard rebate $380–$1,000 depending on income\n• Income cap $48,110 — and half your Social Security doesn't count toward it, which is why a lot of people who assume they're over the line aren't\n• Supplemental rebates in qualifying areas can push the max to $1,500\n• Payments started July 1 · Deadline to file: December 31, 2026\n\nSeparate program for veterans — DVRETX: 100% real estate tax exemption on a primary residence for veterans who are 100% service-connected disabled and meet wartime service and financial need criteria. Financial need is presumed at income of $95,279 or less. Can pass to an unmarried surviving spouse.\n\nTwo programs. Two applications. Filing one doesn't file the other.\n\nEducational only — not tax advice, not VA-endorsed.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty · (570) 688-8147"}], "note": null, "flag": null}, {"id": "thu-cigar", "day": "thu", "time": "—", "title": "Cigar/Lounge Video — Grey Goose Mint Vanilla", "account": "@its.myash", "platform": "IG + TikTok", "kind": "video", "blocks": [{"label": "Script (~60 sec)", "text": "The Rosario Grey Goose Mint Vanilla is the cigar I hand people who think they don't like cigars.\n\nConnecticut wrapper. Mild to mild-medium. Infused with Grey Goose vodka, vanilla, and mint — so you get creamy smoke, real sweetness, and a cool finish instead of pepper and leather.\n\nHere's why it's on the shelf at Nell's Social and not just in my rotation.\n\nIt's an aroma cigar. On a Saturday dance night, a room full of people, this is the stick somebody smells from across the room and comes over to ask about. That's not a small thing. That's the entire conversion moment for a new smoker.\n\nDraw is easy. No learning curve. Nobody's coughing, nobody's overwhelmed, nobody feels stupid.\n\nPair it with a chilled Grey Goose and citrus if you want to mirror the base. Vanilla latte or sweet cream cold brew if you're going the other way and want to pull the cream forward. Cold mint tea with honey if you're not drinking.\n\nWho it's not for: if you're chasing Nicaraguan spice or a dry earthy full-body, this isn't your night. This is dessert.\n\nAnd let me kill something while I'm here — \"Dominican means mild\" is dead. DR just got a Geographical Indication on Dominican cigars. 196 million premium cigars exported to 148 countries. Dominican isn't mild. Dominican is precise.\n\nNell's Social. 25 Route 611, Suite 1, Bartonsville. Thursday movies, Friday spades, Saturday dance."}, {"label": "Caption", "text": "The cigar I hand people who swear they don't like cigars: Rosario Grey Goose Mint Vanilla.\n\nConnecticut wrapper, mild to mild-medium, infused with Grey Goose vodka, vanilla and mint. Creamy smoke, cool finish, easy draw, zero learning curve.\n\nIt's on the shelf at Nell's Social because it's an aroma cigar — on a Saturday dance night it's the stick somebody smells from across the room and walks over to ask about. That's the whole conversion moment.\n\nPAIR IT: chilled Grey Goose + citrus to mirror the base · vanilla latte or sweet cream cold brew to pull the cream forward · cold mint tea with honey if you're not drinking\n\nSKIP IT IF: you want Nicaraguan spice or a dry, earthy full-body. This is dessert.\n\nAnd \"Dominican means mild\" is dead. The DR just secured a Geographical Indication for Dominican cigars — 196 million premium cigars exported to 148 countries last year. Dominican isn't mild. Dominican is precise.\n\nNell's Social · 25 Route 611, Suite 1, Bartonsville, PA\n\n#CigarLife #DominicanCigars #NellsSocial #CigarAuthority #LifeByAlexa"}, {"label": "Visual", "text": "Hands-and-cigar B-roll over voiceover — band close-up, cut, light, first draw, smoke in warm lamp light. No YouTube upload for this one."}], "note": null, "flag": null}, {"id": "thu-sub", "day": "thu", "time": "—", "title": "Substack Article — Experience Economy", "account": "ROAST", "platform": "Substack", "kind": "article", "blocks": [{"label": "Title", "text": "Nell's Social Went From 6 People to 25 by Doing the Same Three Nights Every Week"}, {"label": "Subtitle", "text": "Seven months without a real weekend lineup at our Bartonsville cigar lounge. Thursday movies, Friday spades, Saturday dance party. That's it. That's the strategy."}, {"label": "Article", "text": "Six people.\n\nThat was a normal night at Nell's Social for most of the last seven months. Six people in a cigar lounge in Bartonsville on a weekend. Not dead — six people is a nice night if you're having a conversation. It's a terrible night if you're running a room.\n\nWe're at twenty-five now. Same room, same inventory, same staff.\n\nThe only thing that changed is that people know what night it is.\n\nThursday is movie night. Friday is the spades tournament. Saturday is the dance party.\n\nThat's the entire strategy. I want to be very clear that there was no rebrand, no ad spend, no influencer, no new menu. Three nights, named, in the same order, every single week.\n\nFor seven months before that, we were doing things. Good things, sometimes. But a good event you announce four days out is not a ritual. It's an interruption. It asks people to make a decision. And nobody has decision-making energy left for your lounge on a Thursday.\n\nA ritual doesn't ask for a decision. A ritual is already in the calendar before you post about it.\n\nHere's why the lineup works, night by night.\n\nThursday — movie night. This is the low-commitment door. Thursday is the night somebody who has never been in a cigar lounge will walk in, because the ask is \"come watch something,\" not \"come be a cigar person.\" Movie night is the on-ramp. Nobody has to know what a Connecticut wrapper is to sit down. And a movie gives you the thing that makes a lounge a lounge — permission to be somewhere for two hours without performing.\n\nFriday — spades tournament. This is the loyalty night, and it's the night that actually built the twenty-five. Spades is competitive, it's loud, it's cultural, and it's recurring by nature. You cannot run a tournament once. The whole format demands a next week. People who lost want a rematch. People who won want to defend it. That's not marketing, that's just how cards work. Friday is the night people show up without checking the page first.\n\nSaturday — dance party. This is the volume night and the aroma night. Saturday is when the room fills, when the flavored sticks move — the Rosario Grey Goose Mint Vanilla is doing real work on Saturdays, because it's a mild Connecticut that smells incredible in a crowded room and doesn't intimidate a first-timer. Saturday is the night people take video, and that video is why the social engagement moved.\n\nThree different jobs. One weekend. Nobody has to be told twice.\n\nWhat actually improved, in order:\n\n1. Foot traffic first. Six to twenty-five. That happened before anything else moved, because consistency compounds quietly — week two nobody notices, week five everybody does.\n\n2. Social engagement second, not first. This is the part operators get backwards. We didn't post our way into a full room. We filled the room and then the room made the content. Twenty-five people generate footage. Six people generate a caption.\n\n3. Sales third. Sales followed traffic, not the other way around, and they followed it with a lag. Bar and stick sales don't jump the night the room fills. They jump when the same people come back a third time and stop ordering the cheapest thing.\n\nThe order matters. If you're waiting for the content to fill the room, you're going to be waiting a long time.\n\nThe industry is moving this exact direction and most lounges are missing it.\n\nThe premium cigar world is shifting hard from product-first to experience-first. U.S. cigar lounge revenue is projected around $1.2 billion by the end of 2026, and the lounges taking that share are the ones programming experiences instead of stocking shelves. Curated pairings. Themed nights. Content filmed on-site so the lounge becomes the studio, not just the shop. Reservation-style, quiet-luxury rooms instead of loud TV man-caves.\n\nAnd the thing that gets left out of every one of those trend pieces: an experience you run once is not an experience, it's an event. The whole value of the experience economy is repeatability. People aren't paying for novelty. They're paying for a place where they already know how the night goes.\n\nThat's what seven months of inconsistency cost us. Not the events. The knowing.\n\nIf you run a room, take exactly one thing from this:\n\nName your nights. Say them the same way every week. Do not change them for three months even if a night underperforms.\n\nSix to twenty-five. Three named nights. Seven months of learning it the hard way.\n\nNell's Social · 25 Route 611, Suite 1, Bartonsville, PA · Thursday movies · Friday spades · Saturday dance.\n\n#LifeByAlexa"}], "note": null, "flag": null}, {"id": "thu-note", "day": "thu", "time": "—", "title": "Substack Note 4", "account": "ROAST", "platform": "Substack Notes", "kind": "note", "blocks": [{"label": "Note", "text": "Six people to twenty-five. Same room in Bartonsville, same inventory, same staff.\n\nThe only thing that changed: people know what night it is."}], "note": null, "flag": null}, {"id": "fri-li", "day": "fri", "time": "8:00 AM", "title": "LinkedIn Veteran Post (3/3) — PHFA K-FIT", "account": "@alexa.realtor", "platform": "LinkedIn", "kind": "post", "blocks": [{"label": "Post", "text": "\"I'm a veteran buying in Pennsylvania. Can I use PHFA down payment assistance with my VA loan?\"\n\nYes — and the program most people should be looking at right now is K-FIT.\n\nWhat K-FIT actually is: a PHFA second mortgage providing 5% of the lesser of purchase price or appraised value, applied to down payment and closing costs. There is no maximum dollar cap. Minimum loan is $500. It's forgiven at 10% per year over 10 years — stay in the home a decade and the balance is gone.\n\nOn a $450,000 purchase, that's $22,500 — which typically exceeds the flat-dollar grants many buyers compare it against.\n\nThe requirements that disqualify people:\n• Minimum 660 credit score\n• Post-closing liquid assets cannot exceed $50,000 after closing funds are deducted (retirement assets count only if accessible without penalty)\n\nThe constraint nobody mentions until late: K-FIT cannot be combined with other PHFA assistance. The only exception is ACCESS Home Modification. So you are choosing a lane — K-FIT or a HOMEstead-type grant, not both. Run the math on both before your lender picks for you.\n\nIt does layer with a VA first mortgage, which is the combination worth modeling: zero down on the VA side, K-FIT covering closing costs, no monthly mortgage insurance.\n\nRate context this week: VA purchase rates are running roughly 5.9%–6.3%, against a 30-year conventional near 6.5%.\n\nOne more, since the calendar is running: Pennsylvania's Property Tax/Rent Rebate for the 2025 tax year must be filed by December 31, 2026. Standard rebates run $380–$1,000, income cap $48,110, and half of Social Security is excluded from that cap.\n\nVeteran-friendly guidance. Not VA-endorsed. Not tax or legal advice. No rate guarantees.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty · Monroe County & Lehigh Valley, PA · (570) 688-8147 · Alexa@alexasanchez.net\n\n#VeteranHomebuyer #VALoan #PARealEstate #PHFA"}], "note": null, "flag": null}, {"id": "fri-vetdr", "day": "fri", "time": "12:00 PM", "title": "Veteran Reel (DR) — VA loan doesn't work there", "account": "@alexa.realtor", "platform": "Instagram", "kind": "video", "blocks": [{"label": "Script (55 sec)", "text": "Your VA loan does not work in the Dominican Republic. At all.\n\nVA guaranty is limited to property in the United States and certain U.S. territories. The DR is neither. There is no workaround, no lender who does it, no exception. If somebody tells you otherwise, walk.\n\nSo a DR purchase is cash, a Dominican bank loan, or developer financing. Which means the smart play for a lot of veterans is: keep your VA entitlement working on a Pennsylvania property, and structure the DR purchase separately.\n\nSecond thing, and this one has a date on it. The VA Foreign Medical Program — FMP — covers medically necessary care outside the U.S. for service-connected conditions only. Not everything. Service-connected.\n\nStarting July 2026, taxpayer identification requirements tightened. You need a valid SSN or ITIN correctly recorded on your FMP file, and your foreign provider needs to be willing to register their local tax ID so VA can process the claim. If either piece is missing, you're looking at delays or withholding problems on a claim that should have been routine.\n\nIf you're spending real time in the DR, verify your FMP file now. Not after the bill.\n\nAlexa Sanchez, PA License number RS326383, Smart Way America Realty. Five seven zero, six eight eight, eight one four seven."}, {"label": "IG caption", "text": "The VA loan does not work in the Dominican Republic. There's no workaround.\n\nVA guaranty is limited to property in the U.S. and certain U.S. territories. A DR purchase is cash, a Dominican bank loan, or developer financing — which is exactly why many veterans keep their VA entitlement on a Pennsylvania property and structure the DR buy separately.\n\nFMP — VA Foreign Medical Program\n• Covers medically necessary care outside the U.S. for service-connected conditions only\n• Reimburses the veteran or pays approved providers directly\n• July 2026: taxpayer identification requirements tightened. Have a valid SSN or ITIN correctly recorded on your FMP file, and use providers willing to register their local tax ID (FTIN) so claims process cleanly\n• Missing either piece = delays or withholding issues\n\nOn the property side: Law 171-07 offers fast-track residency (Pensionado at $1,500/mo pension, Rentista at $2,000/mo foreign passive income, Investor at $200,000). And you do not need residency to buy — foreigners can purchase on a tourist entry with essentially the same ownership rights as Dominican citizens.\n\nEducational only. Not VA-endorsed. Not tax or legal advice.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty · (570) 688-8147\n\n#VeteranHomebuyer #VALoan #VeteranRealEstate #DominicanRepublic #PuntaCana #ExpatLife #LifeByAlexa"}, {"label": "Cover text", "text": "RED: YOUR VA LOAN\nWHITE: DOESN'T WORK HERE\nNEON GREEN (small): DOMINICAN REPUBLIC · FMP JULY 2026"}, {"label": "YouTube title", "text": "Can You Use a VA Loan in the Dominican Republic? (No) + FMP Tax ID Rules July 2026"}, {"label": "YouTube description", "text": "Can I use a VA home loan to buy in the Dominican Republic? No. VA loan guaranty is limited to properties located in the United States and certain U.S. territories. The Dominican Republic does not qualify, and there is no lender workaround.\n\nHow do Americans actually finance a DR purchase? Cash, a Dominican bank loan, or developer payment plans. Many veterans keep VA entitlement available for a U.S. property and structure the DR purchase separately.\n\nDo I need residency to buy property in the Dominican Republic? No. Foreigners can purchase on a tourist entry, with ownership rights substantially the same as Dominican citizens.\n\nWhat are the Law 171-07 residency tracks? Pensionado requires a pension of at least $1,500/month plus $250/month per dependent. Rentista requires $2,000/month in foreign-source passive income. The Investor track requires a qualifying investment of at least $200,000.\n\nWhat does the VA Foreign Medical Program cover? FMP covers medically necessary care outside the U.S. for service-connected conditions only, reimbursing the veteran or paying approved providers directly.\n\nWhat changed with FMP in July 2026? Taxpayer identification requirements tightened. Veterans should confirm a valid SSN or ITIN is correctly recorded on their FMP file, and use providers willing to register a local tax ID so claims process without delay or withholding issues.\n\nEducational only. Not VA-endorsed. Not tax, legal, or medical advice.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}], "note": null, "flag": null}, {"id": "fri-landmark", "day": "fri", "time": "—", "title": "Pocono Landmark Spotlight — Thomas Darling", "account": "@alexa.realtor", "platform": "Instagram", "kind": "post", "blocks": [{"label": "IG caption", "text": "Thomas Darling Preserve, Pocono Lake — Tobyhanna Township, off Route 940.\n\n1,400+ protected acres, open dawn to dusk, free. Boardwalk over glacial wetland with one of the largest spruce forests in Pennsylvania sitting behind it. Main entrance at 606 PA-940, Pocono Lake, PA 18347.\n\nTwenty minutes from Blakeslee. Twenty-five from Mount Pocono.\n\nThis is the part of Monroe County that doesn't show up in a listing photo and is the actual reason people move here. Protected land you can walk into on a Tuesday after work without planning a trip around it. That's not a vacation amenity. That's a Tuesday.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty · (570) 688-8147\n\n#PoconoMountains #MonroeCounty #PoconoLiving #ThomasDarlingPreserve #TobyhannaTownship #PoconoHiking #MovingToThePoconos #LifeByAlexa"}, {"label": "Photo", "text": "Primary vertical 4:5 boardwalk frame from Sunday's shoot."}], "note": null, "flag": null}, {"id": "fri-yt-landmark", "day": "fri", "time": "—", "title": "Landmark — YouTube post/Short", "account": "@alexa.realtor", "platform": "YouTube", "kind": "post", "blocks": [{"label": "Community post copy", "text": "Thomas Darling Preserve — Pocono Lake, Tobyhanna Township, Monroe County. 1,400+ acres, dawn to dusk, boardwalk over glacial wetland, one of the largest spruce forests in Pennsylvania. Entrance at 606 PA-940. Free, no reservation, 20 minutes from Blakeslee. This is what living in the Poconos actually looks like on a weekday. — Alexa Sanchez, PA License #RS326383, Smart Way America Realty, (570) 688-8147"}, {"label": "If uploaded as a Short — title", "text": "Thomas Darling Preserve | Hidden Pocono Wetlands Boardwalk Near Blakeslee, PA"}, {"label": "If uploaded as a Short — description", "text": "Where is Thomas Darling Preserve? In Pocono Lake, Tobyhanna Township, Monroe County, Pennsylvania. The main entrance is at 606 PA-940, Pocono Lake, PA 18347, roughly 20 minutes from Blakeslee.\n\nHow big is it and what does it cost? The preserve covers more than 1,400 acres and is open dawn to dusk. There's no admission.\n\nWhat's there? A boardwalk trail crossing glacial wetland, and one of the largest spruce forests in Pennsylvania. It's one of the greenest, most photogenic stops in Monroe County in mid-July.\n\nIs it good for families or beginners? The boardwalk section is flat and short, which makes it one of the more accessible nature stops in the Pocono Mountains.\n\nWhy does this matter if I'm moving to the Poconos? Protected open space like this is a permanent feature of Monroe County, not a seasonal attraction — it's a large part of why buyers relocate here from New York and New Jersey.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}, {"label": "Tags", "text": "thomas darling preserve, pocono lake pa, tobyhanna township, monroe county pa, pocono mountains hiking, things to do in the poconos, blakeslee pa, moving to the poconos, pocono mountains nature, pennsylvania boardwalk trail, pocono realtor, poconos in summer"}], "note": null, "flag": null}, {"id": "fri-dr-en", "day": "fri", "time": "—", "title": "DR Video EN — CONFOTUR", "account": "@alexa.realtor", "platform": "YouTube", "kind": "video", "blocks": [{"label": "Script (under 60 sec)", "text": "CONFOTUR is not automatic and it is not permanent if you ignore it.\n\nHere's what it actually does. On an approved tourism-zone project in the Dominican Republic, CONFOTUR waives the three percent transfer tax at closing — that's nine thousand dollars on a three hundred thousand dollar condo — and it waives the one percent annual property tax for up to fifteen years.\n\nThree things Americans get wrong.\n\nOne. The exemption attaches to the property, not to you. If you buy a resale, you inherit whatever years are left.\n\nTwo. The fifteen-year clock starts at project approval, not at your closing. Buy into a project approved in 2019 and you have eleven years, not fifteen.\n\nThree. And this is the one that costs people. You still file annually with the DGII. The exemption has to be claimed and applied against your account every year. Skip the filing and you get assessed like anybody else, and then you're fighting to unwind it.\n\nConfirm CONFOTUR status through the developer and through DGII records before you underwrite the return. Not the brochure. The records.\n\nAlexa Sanchez, PA License number RS326383, Smart Way America Realty. Five seven zero, six eight eight, eight one four seven."}, {"label": "Caption", "text": "CONFOTUR is not automatic and it doesn't run itself.\n\n✅ Waives the 3% transfer tax at closing ($9,000 on a $300K condo, $15,000 on a $500K villa)\n✅ Waives the 1% annual property tax (IPI) for up to 15 years\n✅ Can waive DR income tax on rental revenue for the same period\n\nWhat buyers miss:\n→ The exemption belongs to the PROPERTY, not the buyer — resale buyers inherit the remaining years\n→ The 15-year clock starts at PROJECT APPROVAL, not your closing date\n→ You still file annually with the DGII so the exemption gets applied. No filing, no exemption.\n→ Notary and registry fees (~1–1.5%) are never waived — those aren't taxes\n→ CONFOTUR exempts DR taxes only. US persons still owe US tax on worldwide income. Route it to a cross-border CPA.\n\nConfirm status with the developer AND DGII records before you underwrite anything.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty · (570) 688-8147\n\n#DominicanRepublicRealEstate #CONFOTUR #PuntaCana #CapCana #DRInvestment #InternationalRealEstate #LifeByAlexa"}, {"label": "YouTube title", "text": "CONFOTUR Explained for American Buyers | Do You File Taxes Every Year in the Dominican Republic?"}, {"label": "YouTube description", "text": "What is CONFOTUR? CONFOTUR (Law 158-01) is a Dominican Republic tax incentive for approved tourism-zone developments. On qualifying projects it waives the 3% property transfer tax (ITBI) at closing and up to 15 years of the 1% annual property tax (IPI), and in many cases DR income tax on rental revenue for the same period.\n\nHow much does CONFOTUR actually save? Roughly $9,000 in transfer tax on a $300,000 condo and $15,000 on a $500,000 villa, plus roughly $3,000–$3,400 per year in IPI on a mid-six-figure property.\n\nDoes CONFOTUR transfer to a resale buyer? Yes. The exemption attaches to the property, not the original purchaser, so a resale buyer inherits the remaining years.\n\nWhen does the 15-year clock start? At project approval — not at your closing date. Always ask for the approval date, not just confirmation of status.\n\nDo I still have to file taxes in the DR with CONFOTUR? Yes. The exemption is claimed and applied through annual filing with the DGII. Skipping the filing risks assessment, and unwinding an assessment is far harder than filing correctly.\n\nWhat is NOT waived? Notary and registry fees, roughly 1–1.5% of value, are service fees rather than taxes and are never exempt. CONFOTUR also exempts Dominican taxes only — US persons remain subject to US tax on worldwide income, typically mitigated with foreign tax credits.\n\nHow do I verify CONFOTUR status? Confirm through the developer, through legal counsel, and against DGII records. Not every project in Punta Cana, Cap Cana, or Las Terrenas is CONFOTUR-approved.\n\n0:00 CONFOTUR is not automatic · 0:10 What it waives · 0:25 Attaches to property not buyer · 0:35 The clock starts at approval · 0:45 The annual DGII filing\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}, {"label": "Tags", "text": "confotur dominican republic, dominican republic real estate taxes, punta cana real estate, cap cana investment, buying property in dominican republic, dr property tax exemption, ITBI transfer tax dominican republic, DGII filing, american buying in dominican republic, caribbean real estate investment, law 158-01, dominican republic condo investment"}], "note": null, "flag": null}, {"id": "fri-dr-es", "day": "fri", "time": "—", "title": "DR Video ES — CONFOTUR", "account": "@alexa.realtor", "platform": "YouTube", "kind": "video", "blocks": [{"label": "Script (Spanish, under 3 min)", "text": "Óyeme bien, porque esto le pasa a nuestra gente todos los años y nadie lo dice.\n\nTú compraste en la República Dominicana. Un proyecto bonito, en zona turística, con CONFOTUR. El vendedor te dijo: \"no pagas impuesto de transferencia y no pagas IPI por quince años.\" Y eso es verdad.\n\nPero hay una parte que no te dijeron.\n\nCONFOTUR no se aplica solo. Tú tienes que declarar todos los años ante la DGII para que la exención se te aplique a tu cuenta. Todos los años. No es una vez y ya.\n\nYo he visto lo que pasa cuando la gente no lo hace. Pasan tres, cuatro años tranquilos. De repente les llega una evaluación de IPI como si nunca hubieran tenido CONFOTUR. Y ahí empieza el problema, mi amor, porque quitar una evaluación que ya te pusieron es mucho más difícil que haber declarado desde el principio.\n\nSegunda cosa. El beneficio no es tuyo. El beneficio es de la propiedad.\n\nEso suena raro pero es a tu favor. Si tú compras de reventa — una unidad que ya alguien más compró — tú heredas los años que le queden a esa propiedad. No empiezas de cero, pero tampoco te dan quince años nuevos.\n\nY aquí está la trampa: los quince años empiezan cuando aprobaron el proyecto. No cuando tú firmaste. Si el proyecto se aprobó en 2019 y tú compras hoy, a ti te quedan once años. No quince. Once.\n\nCuando estés averiguando, no preguntes \"¿esto tiene CONFOTUR?\" Pregunta \"¿en qué fecha se aprobó?\" Esa es la pregunta.\n\nTercera cosa, rápido. Lo que CONFOTUR no cubre.\n\nNo cubre los honorarios de notario ni el registro. Eso es como uno a uno y medio por ciento del valor, y eso se paga siempre, porque eso no es impuesto — eso es servicio.\n\nY si tú eres ciudadano o residente de los Estados Unidos, CONFOTUR solamente te exime de impuestos dominicanos. Tú sigues declarando en los Estados Unidos sobre tu ingreso mundial. Eso lo tienes que llevar con un contador que maneje las dos jurisdicciones. No con el vendedor del proyecto.\n\nTe lo resumo. Confirma la fecha de aprobación. Declara todos los años ante la DGII. Y no cuentes con que el desarrollador te lo va a recordar, porque no te lo va a recordar.\n\nAlexa Sanchez, Realtor licenciada en Pensilvania, licencia RS326383, Smart Way America Realty. Cinco siete cero, seis ocho ocho, ocho uno cuatro siete."}, {"label": "Caption", "text": "CONFOTUR no se aplica solo. Tú tienes que declarar TODOS LOS AÑOS ante la DGII para que la exención se te aplique.\n\nTres cosas que la gente aprende tarde:\n→ Los 15 años empiezan cuando aprobaron el PROYECTO, no cuando tú firmaste. Pregunta la fecha de aprobación.\n→ El beneficio es de la propiedad, no tuyo. En reventa heredas los años que queden.\n→ Notario y registro (1–1.5%) nunca se exoneran. Eso no es impuesto, es servicio.\n\nY si eres residente o ciudadano de EE.UU., CONFOTUR solo te exime de impuestos dominicanos. Sigues declarando allá. Eso va con un contador de las dos jurisdicciones.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty · (570) 688-8147\n\n#BienesRaices #RepublicaDominicana #CONFOTUR #PuntaCana #InversionInmobiliaria #LifeByAlexa"}, {"label": "YouTube title", "text": "CONFOTUR: ¿Hay que declarar todos los años? | Lo que no te dice el vendedor"}, {"label": "YouTube description", "text": "¿Qué es CONFOTUR? CONFOTUR (Ley 158-01) es un incentivo fiscal dominicano para proyectos aprobados en zonas turísticas. Exonera el 3% de impuesto de transferencia (ITBI) al cierre y hasta 15 años del 1% de impuesto anual a la propiedad (IPI).\n\n¿CONFOTUR se aplica automáticamente? No. Hay que declarar anualmente ante la DGII para que la exención se aplique a tu cuenta. Si no declaras, te pueden evaluar como a cualquier otro propietario.\n\n¿Cuándo empiezan los 15 años? Desde la aprobación del proyecto, no desde tu cierre. Un proyecto aprobado en 2019 le deja al comprador de hoy alrededor de 11 años.\n\n¿El beneficio se transfiere en una reventa? Sí. La exención pertenece a la propiedad, no al primer comprador, así que heredas los años restantes.\n\n¿Qué NO cubre CONFOTUR? Honorarios de notario y registro, aproximadamente 1% a 1.5% del valor. Y solo exonera impuestos dominicanos — un ciudadano o residente de EE.UU. sigue declarando su ingreso mundial en Estados Unidos.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}, {"label": "Tags", "text": "confotur, republica dominicana bienes raices, comprar en punta cana, impuestos republica dominicana, DGII IPI, ley 158-01, inversion inmobiliaria republica dominicana, cap cana, comprar apartamento republica dominicana, exencion de impuestos rd, itbi republica dominicana, bienes raices en español"}], "note": null, "flag": null}, {"id": "fri-smoke", "day": "fri", "time": "6:00 PM", "title": "Weekend Smoke Reel — 6 to 25", "account": "@its.myash", "platform": "Instagram", "kind": "video", "blocks": [{"label": "Script (~30 sec)", "text": "Three nights. Same three nights. Every week.\n\nThursday — movie night. That's the door. You don't have to know anything about cigars to sit down and watch something.\n\nFriday — spades tournament. Somebody lost last week and they're coming back for it. That's the format doing the work.\n\nSaturday — dance party. Room's full, the flavored sticks move, and if you're smelling vanilla and mint from the door, that's the Grey Goose Mint Vanilla.\n\nSeven months we didn't have a lineup. Six people on a good night. We're at twenty-five now and I didn't change one thing except doing it the same way every week.\n\nNell's Social. 25 Route 611, Suite 1, Bartonsville. Come Thursday if you're new."}, {"label": "Caption", "text": "Six people to twenty-five. Same room, same inventory, same staff.\n\nThe only thing that changed: people know what night it is.\n\n🎬 THURSDAY — movie night. The low-commitment door. You don't need to know anything about cigars to sit down.\n♠️ FRIDAY — spades tournament. The format does the retention for you. Losers want a rematch, winners want to defend it.\n🕺 SATURDAY — dance party. Room fills, flavored sticks move, and that vanilla-mint you smell at the door is the Rosario Grey Goose Mint Vanilla.\n\nSeven months without a real lineup. Locked it back in, changed nothing else.\n\nNell's Social · 25 Route 611, Suite 1, Bartonsville, PA\n\n#CigarLife #NellsSocial #OperatorLife #LifeByAlexa"}, {"label": "Cover text", "text": "NEON GREEN: 6 → 25"}, {"label": "Visual", "text": "Fast cuts, three nights three visual beats — movie screen glow / cards on a table / room in motion."}], "note": null, "flag": null}, {"id": "fri-fb", "day": "fri", "time": "7:00 PM", "title": "Personal FB — Spanish", "account": "Personal", "platform": "Facebook", "kind": "post", "blocks": [{"label": "Post", "text": "Para mi gente que tiene familia veterana o que está pensando en la República Dominicana — dos cosas que casi nadie explica juntas.\n\nLey 171-07 (residencia rápida): con una pensión de $1,500 al mes calificas por la vía Pensionado, más $250 por cada dependiente. Y sí — una pensión por discapacidad del VA generalmente cuenta. Muchos veteranos ya califican y ni lo saben. También está Rentista ($2,000/mes de ingreso pasivo extranjero) e Inversionista ($200,000).\n\nCONFOTUR (Ley 158-01): en proyectos aprobados en zona turística te exoneran el 3% de transferencia al cierre y hasta 15 años del 1% de IPI anual. Pero el reloj de los 15 años empieza cuando aprobaron el PROYECTO, no cuando tú firmaste. Pregunta siempre la fecha de aprobación.\n\nY una que hay que decir clarito: el préstamo VA no funciona en República Dominicana. Solo aplica en Estados Unidos y ciertos territorios. Allá es efectivo, banco dominicano o financiamiento del desarrollador.\n\nPor eso la jugada para mucha gente es usar el beneficio VA aquí en Pensilvania y estructurar la compra allá por separado.\n\nInformación educativa. No es asesoría fiscal ni legal.\n\nAlexa Sanchez · PA License #RS326383 · Smart Way America Realty · (570) 688-8147"}], "note": null, "flag": null}, {"id": "fri-note", "day": "fri", "time": "—", "title": "Substack Note 5", "account": "ROAST", "platform": "Substack Notes", "kind": "note", "blocks": [{"label": "Note", "text": "Order of operations that most lounge owners have backwards:\nFoot traffic → social engagement → sales.\n\nYou do not post your way into a full room. You fill the room and the room makes the content. Twenty-five people generate footage. Six people generate a caption."}], "note": null, "flag": null}, {"id": "sat-ig", "day": "sat", "time": "10:00 AM", "title": "Spanish IG Post — market", "account": "@alexa.realtor", "platform": "Instagram", "kind": "post", "blocks": [{"label": "Caption", "text": "Los Poconos no son solo cabañas de fin de semana. Mira este número: el precio mediano en el condado de Monroe llegó a unos $308,500 — récord, subió como 7.9% en un año. Y las ventas cerradas bajaron como 17.6%.\n\nEso no se contradice, mi amor. Eso es falta de inventario, no falta de compradores. Se venden menos casas, pero las que se venden se pelean.\n\nLo que eso significa para ti:\n\nSi estás comprando: la tasa a 30 años anda por 6.5%. Si te preaprobaron en la primavera, pide que te la corran otra vez ANTES de seguir mirando casas. Un cuarto de punto en una casa de $400,000 son como $70 a $90 más al mes — eso es $15,000 a $20,000 de poder de compra que se te fue sin que nadie te llamara.\n\nSi estás vendiendo: las casas bien presentadas por debajo de $400,000 se siguen moviendo rápido. Las que se ponen con precios de 2022 se quedan sentadas y terminan bajando más de lo que hubieran bajado si las hubieran puesto bien desde el primer día.\n\nHablemos sin compromiso. (570) 688-8147.\n\nAlexa Sanchez · Realtor Licenciada · PA License #RS326383 · Smart Way America Realty\n\n#BienesRaices #InversionesEnPoconos #MonroeCounty #PoconoMountains #LifeByAlexa"}], "note": null, "flag": null}, {"id": "sat-gbp", "day": "sat", "time": "10:00 AM", "title": "GBP Community/Lifestyle — Thomas Darling", "account": "@alexa.realtor", "platform": "Google Business Profile", "kind": "gbp", "blocks": [{"label": "Post (no hashtags)", "text": "Thomas Darling Preserve, Pocono Lake — Tobyhanna Township, Monroe County.\n\nMore than 1,400 protected acres, open dawn to dusk, with a boardwalk trail over glacial wetland and one of the largest spruce forests in Pennsylvania. Main entrance at 606 PA-940, Pocono Lake, PA 18347. Roughly 20 minutes from Blakeslee, 25 from Mount Pocono, 30 from Stroudsburg.\n\nBuyers relocating to Monroe County from New York and New Jersey consistently name protected open space as a top reason. This is a concrete example of it — free, unticketed, and 20 minutes from most of the housing inventory in the Pocono Lake and Blakeslee area.\n\nAlexa Sanchez · Licensed Realtor · PA License #RS326383 · Smart Way America Realty\n(570) 688-8147 · Alexa@alexasanchez.net"}, {"label": "Photo", "text": "Horizontal 16:9 boardwalk frame from Sunday's shoot. Plain real photo — no overlay card."}], "note": null, "flag": null}, {"id": "sat-note", "day": "sat", "time": "—", "title": "Substack N
