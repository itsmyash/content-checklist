He didn't finish the job.

Then he ghosted. Then he had the nerve to come back and shake me down for money on a job he didn't complete. I stood my ground. He got loud. I didn't.

His boss called him in. Told him to apologize.

That was two days ago. I'm still waiting.

I've been running businesses long enough to know that the people who test you are rarely the ones who quit after one try. They push because somewhere, someone folded. That fold taught them this move works. So they run it again. Until they find the person who doesn't fold. I was that person on Thursday. I'm still that person today.

Loud is almost never about you. Loud is what desperation sounds like when it runs out of options. He didn't have the money. He didn't have the completed work. He didn't have a case. So he got loud. And I got quiet. Because quiet, in that moment, was the power move.

// Build main content
function buildContent(){
  const main = document.getElementById("main-content");
  main.innerHTML = "";
  DAYS.forEach(dayObj => {
    const sec = document.createElement("div");
    sec.className = "day-section";
    sec.innerHTML = `<div class="day-header" onclick="toggleDay('day-body-${dayObj.day}', this)">
      <h2>${dayObj.day}</h2>
      <span>${dayObj.date}</span>
      <span class="day-toggle">▼</span>
    </div>
    <div class="day-body" id="day-body-${dayObj.day}"></div>`;
    main.appendChild(sec);
    const body = sec.querySelector(".day-body");
    dayObj.items.forEach(item => {
      const div = document.createElement("div");
      const isChecked = !!clState[item.id];
      div.className = "item" + (isChecked ? " checked" : "");
      div.id = "item-" + item.id;
      const badgeCls = item.type === "film" ? "badge-film" : item.type === "publish" ? "badge-publish" : item.type === "post" ? "badge-post" : "badge-schedule";
      const badgeTxt = item.type === "film" ? "🎥 FILM" : item.type === "publish" ? "✍️ PUBLISH" : "📅 POST";
      div.innerHTML = `
        <div class="item-cb" onclick="toggleItem('${item.id}')">
          <span class="item-cb-check">✓</span>
        </div>
        <div class="item-body">
          <div class="item-meta">
            <span class="item-time">${item.time}</span>
            <span class="item-account">${item.account}</span>
            <span class="item-type-badge ${badgeCls}">${badgeTxt}</span>
          </div>
          <div class="item-title">${item.title}</div>
          <div class="item-content">${escHtml(item.content)}</div>
          <button class="copy-btn" id="copybtn-${item.id}" onclick="copyItem('${item.id}')">COPY</button>
        </div>`;
      body.appendChild(div);
    });
  });
}

function toggleDay(bodyId, hdr) {
  const body = document.getElementById(bodyId);
  const toggle = hdr.querySelector(".day-toggle");
  if (body.style.display === "none") {
    body.style.display = "";
    toggle.textContent = "▼";
  } else {
    body.style.display = "none";
    toggle.textContent = "▶";
  }
}

function escHtml(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function copyItem(id){
  const item = DAYS.flatMap(d=>d.items).find(i=>i.id===id);
  if(!item) return;
  navigator.clipboard.writeText(item.content).then(()=>{
    const btn = document.getElementById("copybtn-"+id);
    btn.textContent="✓ COPIED"; btn.className="copy-btn done";
    setTimeout(()=>{btn.textContent="COPY"; btn.className="copy-btn";},2000);
  });
}

function toggleItem(id){
  clState[id] = !clState[id];
  saveState();
  const itemEl = document.getElementById("item-"+id);
  if(itemEl) itemEl.className = "item" + (clState[id] ? " checked" : "");
  // sync checklist sidebar
  buildChecklist();
  updateProgress();
}

// Checklist sidebar
function buildChecklist(){
  const body = document.getElementById("cl-body");
  body.innerHTML = "";
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const dayFull = {Sun:"Sunday",Mon:"Monday",Tue:"Tuesday",Wed:"Wednesday",Thu:"Thursday",Fri:"Friday",Sat:"Saturday"};
  days.forEach(day => {
    let items = CL_ITEMS.filter(i => i.day === day);
    if(clFilter === "film") items = items.filter(i => i.type === "film");
    if(clFilter === "post") items = items.filter(i => i.type === "post" || i.type === "publish");
    if(clFilter === "done") items = items.filter(i => clState[i.id]);
    if(!items.length) return;
    const done = items.filter(i=>clState[i.id]).length;
    const hdr = document.createElement("div");
    hdr.className = "cl-day-hdr";
    hdr.innerHTML = `<span>${dayFull[day]}</span><span>${done}/${items.length}</span>`;
    body.appendChild(hdr);
    items.forEach(item => {
      const row = document.createElement("div");
      const ck = !!clState[item.id];
      row.className = "cl-item" + (ck ? " checked" : "");
      row.onclick = () => toggleItem(item.id);
      row.innerHTML = `<div class="cl-cb">${ck?"✓":""}</div><div><div class="cl-txt">${item.label}</div><div class="cl-acct">${item.acct}</div></div>`;
      body.appendChild(row);
    });
  });
}

function setFilter(f){
  clFilter = f;
  ["all","film","post","done"].forEach(k=>{
    document.getElementById("f-"+k).className = "cl-filter" + (k===f?" active":"");
  });
  buildChecklist();
}

function resetAll(){
  if(!confirm("Reset all checkboxes for this week?")) return;
  clState = {};
  saveState();
  buildContent();
  buildChecklist();
  updateProgress();
}

function updateProgress(){
  const done = CL_ITEMS.filter(i=>clState[i.id]).length;
  const pct = Math.round(done/TOTAL*100);
  document.getElementById("prog-lbl").textContent = done+" / "+TOTAL+" complete · "+pct+"%";
  const bar = document.getElementById("prog-inner");
  bar.style.width = pct+"%";
  bar.style.background = pct===100?"#4a8c0f":"#111";
  document.getElementById("cl-foot-lbl").textContent = done+"/"+TOTAL+" done";
}

loadState();
buildContent();
buildChecklist();
updateProgress();
</script>
</body>
</html>
